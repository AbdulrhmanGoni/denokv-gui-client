name: CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment, Either a typical CI run or a CD run where the app is built, tested and released"
        required: true
        default: "CI"
        type: choice
        options:
          - CI
          - Release
      skip-audit:
        description: "Whether to skip the 'Audit dependencies' step in compile-and-test job"
        required: false
        default: false
        type: boolean
      skip-signing-request:
        description: "Whether to skip calling 'dispatch-signing-request' job"
        required: false
        default: false
        type: boolean

  push:
    branches: ["**"]
    paths:
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.svelte"
      - "packages/**/*.html"
      - "packages/**/package.json"
      - "package-lock.json"
      - "package.json"
      - "electron-builder.mjs"
      - "tests/**"
      - "scripts/handleDependenciesAuditResult.ts"

  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.svelte"
      - "packages/**/*.html"
      - "packages/**/package.json"
      - "package-lock.json"
      - "package.json"
      - "electron-builder.mjs"
      - "tests/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment || 'CI' }}
  cancel-in-progress: true

jobs:
  compile-and-test:
    permissions:
      contents: read
    uses: ./.github/workflows/compile-and-test.yml
    with:
      isCD: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'Release' }}
      skip-audit: ${{ inputs.skip-audit == true }}

  publish-bridge-server:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'Release'
    permissions:
      contents: read
      id-token: write
    needs:
      - compile-and-test
    uses: ./.github/workflows/publish-bridge-server.yml

  attest-release-artifacts:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'Release'
    needs:
      - compile-and-test
      - publish-bridge-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    steps:
      - name: Download compiled app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: app-*
          path: dist
          merge-multiple: true

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: "dist/denokv-gui-client*, dist/latest*.yml"

  release:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'Release'
    permissions:
      contents: read
    needs:
      - compile-and-test
      - publish-bridge-server
      - attest-release-artifacts
    uses: ./.github/workflows/release.yml
    secrets:
      BOT_PRIVATE_KEY: ${{ secrets.BOT_PRIVATE_KEY }}

  dispatch-signing-request:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'Release' && !inputs.skip-signing-request
    needs:
      - release
    uses: ./.github/workflows/dispatch-signing-request.yml
    secrets:
      OSSIGN_USER: ${{ secrets.OSSIGN_USER }}
      OSSIGN_TOKEN: ${{ secrets.OSSIGN_TOKEN }}
