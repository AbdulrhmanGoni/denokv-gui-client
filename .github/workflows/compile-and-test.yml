name: Compile and test the app

on:
  workflow_call:
    inputs:
      isCD:
        description: "Whether the current run is triggered via manual dispatch on the main branch or not."
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: "bash"

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_fund: false
  USE_HARD_LINKS: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile-and-test:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
          - macos-15-intel

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: (npm audit --json || true) | node scripts/handleDependenciesAuditResult.ts
        env:
          IS_CD: ${{ inputs.isCD }}

      - name: Download "denokv-x86_64-apple-darwin" binary for mac-x64 build
        if: matrix.os == 'macos-15-intel'
        run: ./scripts/download-denokv-macos-intel-binary.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app's packages
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Run bridge server tests
        run: npm run test --workspace=@app/bridge-server

      - name: Build the app
        run: npm run compile -- -p never

      - name: Run UI e2e tests (Windows, Mac)
        # retry one more time if the tests fail
        run: npm run test || npm run test
        if: matrix.os != 'ubuntu-latest'

      - name: Run UI e2e tests (Linux)
        # retry one more time if the tests fail
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- npm run test || \
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- npm run test
        if: matrix.os == 'ubuntu-latest'

      - name: Upload compiled app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.os }}
          path: dist
