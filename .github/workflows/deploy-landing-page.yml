name: Deploy Landing Page

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "landing/src/**"
      - "landing/public/**"
      - "landing/astro.config.mjs"
      - "landing/package.json"
      - "landing/pnpm-lock.yaml"
      - "screenshots/*.png"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "landing-page-deployment"
  cancel-in-progress: true

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ""
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Extract App's version
        run: echo "APP_VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          npm install -g pnpm@latest-10
          pnpm install
        working-directory: landing

      - name: Build the landing page
        run: pnpm build
        working-directory: landing
        env:
          PUBLIC_APP_VERSION: ${{ env.APP_VERSION }}
          PUBLIC_REPOSITORY_URL: https://github.com/${{ github.repository }}

      - name: Include Linux AppImage install script
        run: |
          sed -i "s/appVersion=\"\"/appVersion="\"$APP_VERSION"\"/g" linux-AppImage-install.sh
          mv linux-AppImage-install.sh landing/dist/

      - name: Upload landing page files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v4
        with:
          path: landing/dist/

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy landing page to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
