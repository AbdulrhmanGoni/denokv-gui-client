name: Publish bridge-server package

on:
  workflow_call:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      isNewVersion: false
    steps:
      - name: Setup the repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ">=23.0.0"

      - name: Extract package's version
        run: echo "PACKAGE_VERSION=$(jq -r .version packages/bridge-server/jsr.json)" >> $GITHUB_ENV

      - name: Check if a new release was prepared
        run: |
          packageVersionsUrl="https://api.jsr.io/scopes/denokv-gui-client/packages/bridge-server/versions/$PACKAGE_VERSION"
          statusCode=$(curl -sSL -o /dev/null -w "%{http_code}" "$packageVersionsUrl")
          if [ -n "$PACKAGE_VERSION" ] && [ "$statusCode" -eq 404 ]; then
            echo "isNewVersion=true" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        if: ${{ env.isNewVersion == 'true' }}
        run: npm ci --workspace=@app/bridge-server

      # Runs only if it's a manual dispatch. "ci-cd" workflow runs bridge server tests before calling this workflow
      - name: Run tests
        if: ${{ env.isNewVersion == 'true' && github.event_name == 'workflow_dispatch' }}
        run: npm run test --workspace=@app/bridge-server

      - name: Publish to JSR
        if: ${{ env.isNewVersion == 'true' }}
        working-directory: packages/bridge-server
        run: npx jsr publish --allow-dirty
